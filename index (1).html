<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babes Hot Chicken</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: "Poppins", sans-serif;
  }
  .container {
    width: 100%;
    max-width: 420px;
    padding: 40px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .profile-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #e8c840;
    margin-bottom: 16px;
  }
  .name a {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    text-decoration: none;
    text-align: center;
    display: block;
    margin-bottom: 10px;
    transition: color 0.2s;
  }
  .name a:hover {
    color: #e8c840;
  }
  .bio {
    color: #aaa;
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 30px;
    max-width: 300px;
  }
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #1e1e1e;
    border-radius: 14px;
    padding: 14px 18px;
    text-decoration: none;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    transition: background 0.2s, transform 0.15s;
    border: 1px solid #2a2a2a;
  }
  .link-btn:hover {
    background: #2a2a2a;
    transform: scale(1.02);
  }
  .link-btn img {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    object-fit: cover;
  }
  .link-btn span {
    flex: 1;
    text-align: center;
  }
</style>
